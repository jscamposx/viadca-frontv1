<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>viadca-mainv1</title>
    <script>
      (function () {
        var DARK_THEMES = ["dark", "violet", "emerald", "rose", "midnight"];
        var t = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        if (DARK_THEMES.indexOf(t) !== -1) document.documentElement.classList.add("dark");
        if (t !== "light" && t !== "dark") document.documentElement.classList.add("theme-" + t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
